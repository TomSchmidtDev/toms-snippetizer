<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carbonite · 100% Offline · No External Calls</title>
<meta name="referrer" content="no-referrer" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: blob:; img-src 'self' data: blob:; connect-src 'none'; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />

<style>
  :root {
    --bg: #0a0a0a;
    --panel: #121212;
    --panel-2: #181818;
    --border: #262626;
    --border-strong: #333;
    --text: #e8e8e8;
    --text-dim: #8a8a8a;
    --text-faint: #545454;
    --accent: #f5b544;
    --accent-dim: #8a6320;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "DejaVu Sans Mono", "Liberation Mono", "Courier New", monospace;
    --ui-mono: ui-monospace, Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--ui-mono);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 320px 1fr 320px;
    grid-template-rows: 52px 1fr;
    height: 100vh;
  }
  header.topbar {
    grid-column: 1 / -1;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  header.topbar::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
    opacity: .35;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .brand .dot {
    width: 10px; height: 10px; background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 14px var(--accent);
  }
  .brand .tag {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-faint);
    margin-left: 6px; padding: 3px 7px;
    border: 1px solid var(--border-strong);
    font-weight: 400;
  }
  .brand .tag.ok {
    color: #7ed957;
    border-color: #2d5a20;
  }

  .topbar-actions { display: flex; gap: 6px; align-items: center; }
  .btn {
    background: transparent; color: var(--text);
    border: 1px solid var(--border-strong);
    padding: 7px 12px;
    font-family: inherit; font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: all .15s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--accent); color: #1a1200;
    border-color: var(--accent); font-weight: 600;
  }
  .btn.primary:hover { background: #ffc85a; border-color: #ffc85a; color: #1a1200; }
  .btn.ghost { border-color: transparent; color: var(--text-dim); }
  .btn.ghost:hover { color: var(--accent); border-color: transparent; }

  aside.left, aside.right {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  aside.right { border-right: none; border-left: 1px solid var(--border); }

  .section {
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before { content: ""; width: 14px; height: 1px; background: var(--accent-dim); }

  label.field { display: block; margin-bottom: 12px; }
  label.field .lbl {
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 6px;
    display: flex; justify-content: space-between; align-items: center;
  }
  label.field .lbl .val { color: var(--accent); }

  select, input[type=text], input[type=number] {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--text); padding: 8px 10px;
    font-family: inherit; font-size: 12px;
    outline: none; transition: border-color .15s;
  }
  select:focus, input:focus { border-color: var(--accent); }
  select {
    cursor: pointer; appearance: none;
    background-image:
      linear-gradient(45deg, transparent 50%, var(--text-dim) 50%),
      linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px; background-repeat: no-repeat;
    padding-right: 26px;
  }

  input[type=range] {
    width: 100%; -webkit-appearance: none; appearance: none;
    background: transparent; height: 20px; cursor: pointer;
  }
  input[type=range]::-webkit-slider-runnable-track { height: 2px; background: var(--border-strong); }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px; background: var(--accent);
    margin-top: -5px; border-radius: 0; cursor: pointer;
  }
  input[type=range]::-moz-range-track { height: 2px; background: var(--border-strong); }
  input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px; background: var(--accent);
    border: 0; border-radius: 0;
  }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; cursor: pointer; user-select: none;
  }
  .toggle .lbl { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
  .switch { position: relative; width: 32px; height: 16px; background: var(--border-strong); transition: background .15s; }
  .switch::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; background: var(--text-dim);
    transition: all .15s;
  }
  .toggle input { display: none; }
  .toggle input:checked + .switch { background: var(--accent-dim); }
  .toggle input:checked + .switch::after { left: 18px; background: var(--accent); }

  .bg-swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .bg-swatches .sw {
    aspect-ratio: 1; border: 1px solid var(--border-strong); cursor: pointer;
    position: relative; transition: transform .1s;
  }
  .bg-swatches .sw:hover { transform: scale(1.06); border-color: var(--accent); }
  .bg-swatches .sw.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }

  input[type=color] {
    width: 100%; height: 28px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    cursor: pointer; padding: 2px;
  }

  main.canvas {
    background:
      linear-gradient(45deg, #0f0f0f 25%, transparent 25%),
      linear-gradient(-45deg, #0f0f0f 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #0f0f0f 75%),
      linear-gradient(-45deg, transparent 75%, #0f0f0f 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, 10px 0;
    background-color: #090909;
    overflow: auto;
    display: flex; align-items: center; justify-content: center;
    padding: 40px; position: relative;
  }
  main.canvas::before {
    content: ""; position: absolute; inset: 0;
    background:
      linear-gradient(to right, rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }
  .canvas-meta {
    position: absolute; top: 14px; left: 20px;
    font-size: 10px; letter-spacing: 2px;
    color: var(--text-faint); text-transform: uppercase;
    pointer-events: none;
  }
  .canvas-meta span { color: var(--accent); }

  #stage {
    position: relative;
    padding: var(--pad-y, 56px) var(--pad-x, 56px);
    background: var(--stage-bg, linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%));
    display: inline-block; transition: padding .2s, background .2s;
  }

  #card {
    background: var(--card-bg, #282c34);
    border-radius: var(--radius, 10px);
    box-shadow: var(--shadow, 0 20px 68px rgba(0,0,0,.55));
    overflow: hidden;
    min-width: 520px; max-width: 1100px;
    transition: border-radius .2s, box-shadow .2s;
  }

  .window-header {
    display: flex; align-items: center;
    padding: 14px 16px; gap: 8px;
    background: rgba(0,0,0,.12);
    border-bottom: 1px solid rgba(255,255,255,.04);
    min-height: 38px;
  }
  .window-header.hidden { display: none; }
  .traffic { display: flex; gap: 6px; }
  .traffic span { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .traffic.mac span:nth-child(1) { background: #ff5f56; }
  .traffic.mac span:nth-child(2) { background: #ffbd2e; }
  .traffic.mac span:nth-child(3) { background: #27c93f; }
  .traffic.windows { gap: 0; }
  .traffic.windows span {
    width: 28px; height: 14px; border-radius: 0; background: transparent;
    position: relative; font-size: 10px; line-height: 14px; text-align: center;
    color: rgba(255,255,255,.65);
  }
  .traffic.windows span:nth-child(1)::before { content: "—"; }
  .traffic.windows span:nth-child(2)::before { content: "▢"; }
  .traffic.windows span:nth-child(3)::before { content: "✕"; }

  .window-title-input {
    flex: 1; background: transparent; border: none;
    color: rgba(255,255,255,.55); text-align: center;
    font-family: inherit; font-size: 12px; outline: none; padding: 0;
  }

  .code-wrap { position: relative; display: flex; padding: 14px 0 18px; background: transparent; }
  .line-numbers {
    user-select: none; padding: 0 14px 0 20px;
    color: rgba(255,255,255,.25);
    font-family: var(--code-font, var(--mono));
    font-size: var(--code-size, 14px);
    line-height: var(--code-lh, 1.55);
    text-align: right; min-width: 40px;
  }
  .line-numbers.hidden { display: none; }
  .line-numbers div { white-space: pre; }

  pre.code-pre {
    margin: 0; padding: 0 24px 0 6px; flex: 1;
    overflow: visible; white-space: pre;
    font-family: var(--code-font, var(--mono));
    font-size: var(--code-size, 14px);
    line-height: var(--code-lh, 1.55);
  }
  pre.code-pre code.hljs {
    background: transparent !important;
    padding: 0;
    font-family: inherit; font-size: inherit; line-height: inherit;
  }

  .watermark {
    position: absolute; bottom: 8px; right: 14px;
    font-size: 10px; color: rgba(255,255,255,.3);
    letter-spacing: 1px; font-family: var(--mono);
    pointer-events: none;
  }
  .watermark.hidden { display: none; }

  .editor-wrap {
    position: relative;
    border: 1px solid var(--border-strong);
    background: var(--bg);
    display: flex; flex-direction: column;
    height: 100%; min-height: 280px;
  }
  .editor-wrap textarea {
    width: 100%; height: 100%;
    background: transparent; color: var(--text);
    border: none; outline: none; padding: 12px;
    font-family: var(--mono); font-size: 12px; line-height: 1.55;
    resize: none; white-space: pre; overflow: auto; tab-size: 2;
  }

  .export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

  .hint {
    font-size: 10px; color: var(--text-faint);
    line-height: 1.5; letter-spacing: .5px; margin-top: 6px;
  }

  .flash {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--accent);
    padding: 10px 18px; font-size: 11px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--accent);
    opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 1000;
  }
  .flash.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

  @media (max-width: 1100px) { .app { grid-template-columns: 260px 1fr 260px; } }
  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 52px auto auto auto; height: auto; }
    html, body { overflow: auto; }
    main.canvas { min-height: 60vh; }
  }
</style>
<style id="currentTheme"></style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span>CARBONITE</span>
    </div>
    <div class="topbar-actions">
      <button class="btn ghost" id="btnReset" title="Reset all">↺ Reset</button>
      <button class="btn" id="btnCopyImg">⧉ Copy PNG</button>
      <button class="btn" id="btnExportSvg">SVG</button>
      <button class="btn" id="btnExportRtf">RTF</button>
      <button class="btn" id="btnExportHtml">HTML</button>
      <button class="btn primary" id="btnExportPng">⬇ Export PNG</button>
    </div>
  </header>

  <aside class="left">
    <div class="section" style="flex:1; display:flex; flex-direction:column;">
      <div class="section-title">Source</div>
      <label class="field">
        <div class="lbl">Language <span class="val" id="langVal">auto</span></div>
        <select id="language"></select>
      </label>
      <div style="display:flex; gap:6px; margin-bottom:10px;">
        <button class="btn" id="btnBeautify" style="flex:1;" title="Format code for the current language (Ctrl+Shift+F)">✨ Beautify</button>
        <button class="btn" id="btnBeautifyUndo" title="Undo last Beautify" style="padding:7px 10px;">↶</button>
      </div>
      <div class="editor-wrap" style="flex:1;">
        <textarea id="code" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      </div>
    </div>
  </aside>

  <main class="canvas" id="canvas">
    <div class="canvas-meta">PREVIEW · <span id="dimensions">—</span></div>
    <div id="stage">
      <div id="card">
        <div class="window-header" id="windowHeader">
          <div class="traffic mac" id="traffic"><span></span><span></span><span></span></div>
          <input type="text" class="window-title-input" id="windowTitle" value="" placeholder="" />
          <div style="width:60px;"></div>
        </div>
        <div class="code-wrap">
          <div class="line-numbers" id="lineNumbers"></div>
          <pre class="code-pre"><code id="output" class="hljs"></code></pre>
        </div>
        <div class="watermark hidden" id="watermark">carbonite</div>
      </div>
    </div>
  </main>

  <aside class="right">

    <div class="section">
      <div class="section-title">Theme</div>
      <label class="field">
        <div class="lbl">Syntax Theme</div>
        <select id="theme"></select>
      </label>

      <label class="field">
        <div class="lbl">Card Background</div>
        <input type="color" id="cardBg" value="#282c34" />
        <div class="hint">Set automatically from the selected theme.</div>
      </label>

      <label class="toggle"><span class="lbl">Auto Card BG from Theme</span>
        <input type="checkbox" id="autoCardBg" checked /><span class="switch"></span>
      </label>
    </div>

    <div class="section">
      <div class="section-title">Window</div>
      <label class="field">
        <div class="lbl">Controls</div>
        <select id="windowStyle">
          <option value="mac">macOS traffic lights</option>
          <option value="windows">Windows</option>
          <option value="none">None</option>
          <option value="hide">Hide header</option>
        </select>
      </label>
      <label class="field">
        <div class="lbl">Title</div>
        <input type="text" id="titleInput" placeholder="Optional window title" />
      </label>
      <label class="toggle"><span class="lbl">Line numbers</span>
        <input type="checkbox" id="showLines" /><span class="switch"></span>
      </label>
      <label class="toggle"><span class="lbl">Watermark</span>
        <input type="checkbox" id="showWatermark" /><span class="switch"></span>
      </label>
    </div>

    <div class="section">
      <div class="section-title">Background</div>
      <div class="bg-swatches" id="bgSwatches"></div>
      <label class="field" style="margin-top: 14px;">
        <div class="lbl">Custom color</div>
        <input type="color" id="customBg" value="#ff9a9e" />
      </label>
      <label class="toggle"><span class="lbl">Transparent</span>
        <input type="checkbox" id="transparent" /><span class="switch"></span>
      </label>
    </div>

    <div class="section">
      <div class="section-title">Layout</div>
      <label class="field">
        <div class="lbl">Padding X <span class="val" id="padXVal">56px</span></div>
        <input type="range" id="padX" min="0" max="160" value="56" />
      </label>
      <label class="field">
        <div class="lbl">Padding Y <span class="val" id="padYVal">56px</span></div>
        <input type="range" id="padY" min="0" max="160" value="56" />
      </label>
      <label class="field">
        <div class="lbl">Border Radius <span class="val" id="radVal">10px</span></div>
        <input type="range" id="radius" min="0" max="30" value="10" />
      </label>
      <label class="field">
        <div class="lbl">Shadow <span class="val" id="shadowVal">68</span></div>
        <input type="range" id="shadow" min="0" max="120" value="68" />
      </label>
    </div>

    <div class="section">
      <div class="section-title">Typography</div>
      <label class="field">
        <div class="lbl">Font family (system)</div>
        <select id="fontFamily">
          <option value='ui-monospace, Menlo, Consolas, "DejaVu Sans Mono", monospace'>System Default</option>
          <option value="Consolas, 'Liberation Mono', monospace">Consolas (Windows)</option>
          <option value="Menlo, Monaco, monospace">Menlo / Monaco (macOS)</option>
          <option value="'SF Mono', ui-monospace, monospace">SF Mono (macOS)</option>
          <option value="'Courier New', Courier, monospace">Courier New</option>
          <option value="'DejaVu Sans Mono', monospace">DejaVu Sans Mono</option>
          <option value="'Liberation Mono', monospace">Liberation Mono</option>
          <option value="'Lucida Console', monospace">Lucida Console</option>
          <option value="monospace">Browser Default</option>
        </select>
        <div class="hint">Nur System-Fonts – keine Webfonts, keine Netzwerkanfragen.</div>
      </label>
      <div class="row">
        <label class="field">
          <div class="lbl">Size <span class="val" id="sizeVal">14</span></div>
          <input type="range" id="fontSize" min="10" max="28" value="14" />
        </label>
        <label class="field">
          <div class="lbl">Line <span class="val" id="lhVal">1.55</span></div>
          <input type="range" id="lineHeight" min="100" max="250" value="155" />
        </label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Format</div>
      <label class="field">
        <div class="lbl">Beautify indent <span class="val" id="indentVal">4 spaces</span></div>
        <select id="indentStyle">
          <option value="2">2 spaces</option>
          <option value="4" selected>4 spaces</option>
          <option value="8">8 spaces</option>
          <option value="tab">Tab character</option>
        </select>
        <div class="hint">Applies to all Beautify calls (JS, JSON, XML, SQL, CSS, HTML, Java, …).</div>
      </label>
    </div>

    <div class="section">
      <div class="section-title">Export</div>
      <div class="export-grid">
        <button class="btn" id="btnExportPng2">⬇ PNG</button>
        <button class="btn" id="btnExportSvg2">⬇ SVG</button>
        <button class="btn" id="btnExportHtml2">⬇ HTML</button>
        <button class="btn" id="btnExportRtf2">⬇ RTF</button>
      </div>
      <label class="field" style="margin-top:12px;">
        <div class="lbl">Export scale <span class="val" id="scaleVal">2×</span></div>
        <input type="range" id="scale" min="1" max="4" value="2" />
      </label>
      <div class="hint">RTF opens directly in Word/Outlook. HTML is a self-contained file with the theme CSS embedded inline.</div>
    </div>

  </aside>
</div>

<div class="flash" id="flash">Copied</div>

<script>
"use strict";

const DEFAULT_CODE = `// Willkommen bei Carbonite – 100% offline.
// Dieser Editor macht KEINE Netzwerkaufrufe.

import { useState, useEffect } from "react";

export function Counter({ initial = 0 }) {
  const [count, setCount] = useState(initial);

  useEffect(() => {
    document.title = \`Count: \${count}\`;
  }, [count]);

  return (
    <button onClick={() => setCount(c => c + 1)}>
      Klicks: {count}
    </button>
  );
}`;

const el = (id) => document.getElementById(id);
const codeInput = el("code");
const output    = el("output");
const stage     = el("stage");
const card      = el("card");
const lineNums  = el("lineNumbers");
const themeStyleEl = el("currentTheme");

/* ---------- Populate Language dropdown from hljs registry ---------- */
(function populateLanguages() {
  const sel = el("language");
  const available = hljs.listLanguages().sort();
  const common = [
    "javascript","typescript","python","java","bash","shell",
    "json","xml","yaml","html","css","scss",
    "sql","markdown",
    "c","cpp","rust","go","csharp","kotlin","swift","objectivec",
    "ruby","php","lua","r","scala",
    "dockerfile","makefile","ini","diff","graphql","plaintext"
  ];
  const inList = new Set(available);
  sel.innerHTML = "";
  const auto = document.createElement("option");
  auto.value = "auto"; auto.textContent = "Auto-detect";
  sel.appendChild(auto);

  const group1 = document.createElement("optgroup");
  group1.label = "Common";
  common.filter(l => inList.has(l)).forEach(l => {
    const o = document.createElement("option");
    o.value = l; o.textContent = l; group1.appendChild(o);
  });
  sel.appendChild(group1);

  const group2 = document.createElement("optgroup");
  group2.label = "All available (" + available.length + ")";
  available.forEach(l => {
    if (common.includes(l)) return;
    const o = document.createElement("option");
    o.value = l; o.textContent = l; group2.appendChild(o);
  });
  sel.appendChild(group2);
})();

/* ---------- Populate Theme dropdown ---------- */
(function populateThemes() {
  const sel = el("theme");
  const dark = [], light = [];
  Object.entries(THEMES_CSS).forEach(([key, v]) => {
    const name = v.name;
    // light/dark detection: naive — any theme whose key ends in -light or starts with `github`/`xcode`/`a11y-light` goes to light
    if (/light|github$|xcode|ascetic|docco|idea|^vs$/.test(key)) light.push([key, name]);
    else dark.push([key, name]);
  });

  const gD = document.createElement("optgroup"); gD.label = "Dark";
  dark.forEach(([k,n]) => {
    const o = document.createElement("option"); o.value = k; o.textContent = n;
    gD.appendChild(o);
  });
  sel.appendChild(gD);

  const gL = document.createElement("optgroup"); gL.label = "Light";
  light.forEach(([k,n]) => {
    const o = document.createElement("option"); o.value = k; o.textContent = n;
    gL.appendChild(o);
  });
  sel.appendChild(gL);

  sel.value = "atom-one-dark";
})();

function applyTheme(key) {
  const t = THEMES_CSS[key];
  if (!t) return;
  themeStyleEl.textContent = t.css;
}

/* ---------- Gradient swatches ---------- */
const GRADIENTS = [
  "linear-gradient(135deg,#ff9a9e 0%,#fad0c4 100%)",
  "linear-gradient(135deg,#a1c4fd 0%,#c2e9fb 100%)",
  "linear-gradient(135deg,#667eea 0%,#764ba2 100%)",
  "linear-gradient(135deg,#f093fb 0%,#f5576c 100%)",
  "linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)",
  "linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)",
  "linear-gradient(135deg,#fa709a 0%,#fee140 100%)",
  "linear-gradient(135deg,#30cfd0 0%,#330867 100%)",
  "linear-gradient(135deg,#f6d365 0%,#fda085 100%)",
  "linear-gradient(135deg,#84fab0 0%,#8fd3f4 100%)",
  "linear-gradient(135deg,#fccb90 0%,#d57eeb 100%)",
  "linear-gradient(135deg,#e0c3fc 0%,#8ec5fc 100%)",
  "linear-gradient(180deg,#0f2027 0%,#203a43 50%,#2c5364 100%)",
  "linear-gradient(135deg,#232526 0%,#414345 100%)",
  "linear-gradient(135deg,#1a2980 0%,#26d0ce 100%)",
  "linear-gradient(135deg,#ee0979 0%,#ff6a00 100%)",
  "linear-gradient(135deg,#0ba360 0%,#3cba92 100%)",
  "linear-gradient(135deg,#fdfcfb 0%,#e2d1c3 100%)",
];
const bgSwatches = el("bgSwatches");
GRADIENTS.forEach((g, i) => {
  const d = document.createElement("div");
  d.className = "sw" + (i === 0 ? " active" : "");
  d.style.background = g;
  d.dataset.bg = g;
  d.addEventListener("click", () => {
    document.querySelectorAll(".bg-swatches .sw").forEach(s => s.classList.remove("active"));
    d.classList.add("active");
    el("transparent").checked = false;
    stage.style.background = g;
  });
  bgSwatches.appendChild(d);
});

/* ---------- Render ---------- */
function render() {
  const lang = el("language").value;
  const src  = codeInput.value;

  output.className = "hljs";
  output.textContent = src;

  try {
    if (lang === "auto" || !lang) {
      const r = hljs.highlightAuto(src);
      output.innerHTML = r.value;
      output.classList.add("language-" + (r.language || "plaintext"));
      el("langVal").textContent = r.language || "auto";
    } else {
      const r = hljs.highlight(src, { language: lang, ignoreIllegals: true });
      output.innerHTML = r.value;
      output.classList.add("language-" + lang);
      el("langVal").textContent = lang;
    }
  } catch (e) {
    output.textContent = src;
  }

  const lines = src.split("\n").length;
  if (el("showLines").checked) {
    let html = "";
    for (let i = 1; i <= lines; i++) html += "<div>" + i + "</div>";
    lineNums.innerHTML = html;
    lineNums.classList.remove("hidden");
  } else {
    lineNums.classList.add("hidden");
  }

  if (el("autoCardBg").checked) {
    const themeCss = (THEMES_CSS[el("theme").value] || {}).css || "";
    const m = themeCss.match(/\.hljs\s*\{[^}]*?background\s*:\s*(#[0-9a-fA-F]{3,8})/);
    const bg = m ? m[1] : null;
    if (bg) {
      card.style.background = bg;
      el("cardBg").value = bg.length === 4
        ? "#" + bg[1]+bg[1]+bg[2]+bg[2]+bg[3]+bg[3]
        : bg.slice(0, 7);
    }
  } else {
    card.style.background = el("cardBg").value;
  }
  updateDimensions();
}

function updateDimensions() {
  requestAnimationFrame(() => {
    const r = stage.getBoundingClientRect();
    el("dimensions").textContent = Math.round(r.width) + " × " + Math.round(r.height);
  });
}

/* Theme change */
el("theme").addEventListener("change", () => {
  applyTheme(el("theme").value);
  render();
});

/* Range wiring */
function wireRange(id, valId, suffix, cssVar, transform = v => v) {
  const input = el(id);
  input.addEventListener("input", () => {
    const v = +input.value;
    el(valId).textContent = transform(v) + (suffix || "");
    if (cssVar) stage.style.setProperty(cssVar, transform(v) + (suffix || ""));
    if (id === "shadow") applyShadow();
    if (id === "radius") card.style.setProperty("--radius", v + "px");
    if (id === "fontSize" || id === "lineHeight") applyType();
    updateDimensions();
  });
}
wireRange("padX", "padXVal", "px", "--pad-x");
wireRange("padY", "padYVal", "px", "--pad-y");
wireRange("radius", "radVal", "px");
wireRange("shadow", "shadowVal", "");
wireRange("fontSize", "sizeVal", "", null, v => v);
wireRange("lineHeight", "lhVal", "", null, v => (v/100).toFixed(2));
wireRange("scale", "scaleVal", "×");

function applyShadow() {
  const v = +el("shadow").value;
  if (v === 0) { card.style.setProperty("--shadow", "none"); return; }
  card.style.setProperty("--shadow", `0 ${Math.round(v*.3)}px ${v}px rgba(0,0,0,${Math.min(.8, v/100)})`);
}
function applyType() {
  const size = el("fontSize").value;
  const lh = (el("lineHeight").value / 100).toFixed(2);
  card.style.setProperty("--code-size", size + "px");
  card.style.setProperty("--code-lh", lh);
}

el("showLines").addEventListener("change", render);
el("showWatermark").addEventListener("change", () => {
  el("watermark").classList.toggle("hidden", !el("showWatermark").checked);
});
el("transparent").addEventListener("change", () => {
  if (el("transparent").checked) stage.style.background = "transparent";
  else {
    const active = document.querySelector(".bg-swatches .sw.active");
    stage.style.background = active ? active.dataset.bg : el("customBg").value;
  }
});
el("customBg").addEventListener("input", () => {
  document.querySelectorAll(".bg-swatches .sw").forEach(s => s.classList.remove("active"));
  el("transparent").checked = false;
  stage.style.background = el("customBg").value;
});
el("cardBg").addEventListener("input", () => {
  el("autoCardBg").checked = false;
  card.style.background = el("cardBg").value;
});
el("autoCardBg").addEventListener("change", render);

el("windowStyle").addEventListener("change", () => {
  const v = el("windowStyle").value;
  const hdr = el("windowHeader");
  const traffic = el("traffic");
  hdr.classList.remove("hidden");
  traffic.style.visibility = "visible";
  traffic.className = "traffic";
  if (v === "mac") traffic.classList.add("mac");
  else if (v === "windows") traffic.classList.add("windows");
  else if (v === "none") traffic.style.visibility = "hidden";
  else if (v === "hide") hdr.classList.add("hidden");
});

el("titleInput").addEventListener("input", () => {
  el("windowTitle").value = el("titleInput").value;
});

el("fontFamily").addEventListener("change", () => {
  card.style.setProperty("--code-font", el("fontFamily").value);
});

el("indentStyle").addEventListener("change", () => {
  const v = el("indentStyle").value;
  el("indentVal").textContent = (v === "tab") ? "Tab" : (v + " spaces");
});

codeInput.addEventListener("input", render);
el("language").addEventListener("change", render);

codeInput.addEventListener("keydown", (e) => {
  if (e.key === "Tab") {
    e.preventDefault();
    const s = codeInput.selectionStart, end = codeInput.selectionEnd;
    codeInput.value = codeInput.value.slice(0, s) + "  " + codeInput.value.slice(end);
    codeInput.selectionStart = codeInput.selectionEnd = s + 2;
    render();
  }
});

el("btnReset").addEventListener("click", () => {
  if (!confirm("Clear all saved settings and reload?")) return;
  try { localStorage.removeItem(SETTINGS_KEY); } catch(e) {}
  location.reload();
});

/* ---------- Flash ---------- */
function flash(msg) {
  const f = el("flash");
  f.textContent = msg;
  f.classList.add("show");
  clearTimeout(flash._t);
  flash._t = setTimeout(() => f.classList.remove("show"), 1600);
}

/* ---------- Export options (skipFonts:true guarantees html-to-image makes no font fetch) ---------- */
const H2I_OPTS = () => ({
  pixelRatio: +el("scale").value,
  cacheBust: false,
  skipFonts: true,       // crucial: prevents html-to-image from fetching any @font-face URLs
  fontEmbedCSS: "",      // prevent any font embedding attempts
});

async function exportPng(download = true) {
  const dataUrl = await htmlToImage.toPng(stage, H2I_OPTS());
  if (download) {
    const a = document.createElement("a");
    a.download = filename("png"); a.href = dataUrl; a.click();
    flash("PNG exportiert");
  }
  return dataUrl;
}

async function exportSvg() {
  const dataUrl = await htmlToImage.toSvg(stage, H2I_OPTS());
  const a = document.createElement("a");
  a.download = filename("svg"); a.href = dataUrl; a.click();
  flash("SVG exportiert");
}

async function copyPng() {
  try {
    const blob = await htmlToImage.toBlob(stage, H2I_OPTS());
    await navigator.clipboard.write([ new ClipboardItem({ "image/png": blob }) ]);
    flash("PNG in Zwischenablage");
  } catch (e) {
    console.error(e);
    flash("Kopieren fehlgeschlagen");
  }
}

function filename(ext) {
  const base = (el("titleInput").value || "carbonite").replace(/[^a-z0-9_-]+/gi, "_").slice(0, 40) || "carbonite";
  return `${base}_${Date.now()}.${ext}`;
}

/* ---------- HTML export (uses INLINED theme CSS – no fetch) ---------- */
function exportHtml() {
  const theme = el("theme").value;
  const themeCss = (THEMES_CSS[theme] && THEMES_CSS[theme].css) || "";

  const codeHtml = output.innerHTML;
  const lang = el("langVal").textContent;
  const cardBg = getComputedStyle(card).backgroundColor;
  const stageBg = stage.style.background || getComputedStyle(stage).background;
  const radius = card.style.getPropertyValue("--radius") || "10px";
  const shadow = card.style.getPropertyValue("--shadow") || "0 20px 68px rgba(0,0,0,.55)";
  const padX = stage.style.getPropertyValue("--pad-x") || "56px";
  const padY = stage.style.getPropertyValue("--pad-y") || "56px";
  const font = el("fontFamily").value;
  const size = el("fontSize").value + "px";
  const lh = (el("lineHeight").value/100).toFixed(2);
  const title = el("titleInput").value || "";
  const wStyle = el("windowStyle").value;
  const showLines = el("showLines").checked;
  const lines = codeInput.value.split("\n").length;

  let lineNumHtml = "";
  if (showLines) for (let i = 1; i <= lines; i++) lineNumHtml += `<div>${i}</div>`;

  let trafficHtml = "";
  if (wStyle === "mac") {
    trafficHtml = `<div class="traffic mac"><span style="width:12px;height:12px;border-radius:50%;background:#ff5f56;display:inline-block"></span><span style="width:12px;height:12px;border-radius:50%;background:#ffbd2e;display:inline-block"></span><span style="width:12px;height:12px;border-radius:50%;background:#27c93f;display:inline-block"></span></div>`;
  } else if (wStyle === "windows") {
    trafficHtml = `<div class="traffic windows"><span>—</span><span>▢</span><span>✕</span></div>`;
  }

  const headerHtml = wStyle === "hide" ? "" : `
    <div class="cbn-header">
      ${trafficHtml}
      <div class="cbn-title">${escapeHtml(title)}</div>
      <div style="width:60px"></div>
    </div>`;

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${escapeHtml(title || "Carbonite export")}</title>
<style>
${themeCss}
html, body { margin:0; padding:0; background:#111; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family: ${font.replace(/"/g,"'")}; }
.cbn-stage { padding: ${padY} ${padX}; background: ${stageBg}; display:inline-block; }
.cbn-card { background: ${cardBg}; border-radius:${radius}; box-shadow:${shadow}; overflow:hidden; min-width:480px; }
.cbn-header { display:flex; align-items:center; gap:8px; padding:14px 16px; background:rgba(0,0,0,.12); border-bottom:1px solid rgba(255,255,255,.04); }
.traffic { display:flex; gap:6px; }
.traffic.windows { gap:0; }
.traffic.windows span { width:28px; height:14px; border-radius:0; background:transparent; color:rgba(255,255,255,.65); text-align:center; font-size:10px; line-height:14px; }
.cbn-title { flex:1; text-align:center; color:rgba(255,255,255,.55); font-size:12px; }
.cbn-body { display:flex; padding:14px 0 18px; }
.cbn-lines { padding: 0 14px 0 20px; color: rgba(255,255,255,.25); font-size: ${size}; line-height: ${lh}; text-align:right; min-width:40px; user-select:none; white-space:pre; }
pre.cbn-pre { margin:0; padding:0 24px 0 6px; flex:1; font-size: ${size}; line-height: ${lh}; white-space:pre; }
code.hljs { background: transparent !important; padding:0; font: inherit; }
</style>
</head>
<body>
  <div class="cbn-stage">
    <div class="cbn-card">
      ${headerHtml}
      <div class="cbn-body">
        ${showLines ? `<div class="cbn-lines">${lineNumHtml}</div>` : ""}
        <pre class="cbn-pre"><code class="hljs language-${lang}">${codeHtml}</code></pre>
      </div>
    </div>
  </div>
</body>
</html>`;

  const blob = new Blob([html], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename("html");
  a.click();
  flash("HTML exportiert");
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

  const halfPt = sizePt * 2;

  const plainHtml = output.innerHTML;

  const measure = document.createElement("div");
  measure.style.cssText = "position:absolute;left:-99999px;top:0;white-space:pre;";
  measure.innerHTML = '<code class="hljs ' + output.className + '">' + plainHtml + '</code>';
  document.body.appendChild(measure);
  const themeCode = measure.firstChild;
  themeCode.style.background = "transparent";

  const tokens = [];
  function walk(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      const parentEl = node.parentElement;
      const color = parentEl === themeCode ? "auto" : rgbToHexStr(getComputedStyle(parentEl).color);
      if (!colors.has(color)) colors.set(color, colors.size);
      tokens.push({ text: node.nodeValue, color });
      return;
    }
    for (const c of node.childNodes) walk(c);
  }
  walk(themeCode);
  document.body.removeChild(measure);

  const colorList = [...colors.entries()]
    .filter(([k]) => k !== "auto")
    .sort((a,b) => a[1] - b[1])
    .map(([hex]) => hex);

  let colorTable = "{\\colortbl;";
  colorTable += colorList.map(h => {
    const [r,g,b] = hexToRgb(h);
    return `\\red${r}\\green${g}\\blue${b};`;
  }).join("");
  colorTable += "}";

  const cardColorIdx = colors.get(cardHex);

  let body = "";
  for (const t of tokens) {
    const idx = t.color === "auto" ? 0 : colors.get(t.color);
    const cf = idx > 0 ? `\\cf${idx}` : "\\cf0";
    const cb = cardColorIdx > 0 ? `\\highlight${cardColorIdx}` : "";
    body += `${cf}${cb} ${escapeRtf(t.text)}`;
  }

  const fontTable = `{\\fonttbl{\\f0\\fmodern\\fcharset0 ${escapeRtf(family)};}}`;
  const header = `{\\rtf1\\ansi\\ansicpg1252\\deff0\\nouicompat${fontTable}${colorTable}`;
  const prefix = `\\viewkind4\\uc1\\pard\\f0\\fs${halfPt} `;
  const suffix = `}`;

  const rtf = header + prefix + body + suffix;
  const blob = new Blob([rtf], { type: "application/rtf" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename("rtf");
  a.click();
  flash("RTF exportiert");
}

function parseRgb(str) {
  const m = (str||"").match(/\d+(\.\d+)?/g);
  if (!m) return [40,44,52];
  return [ +m[0], +m[1], +m[2] ];
}
function rgbArrayToHex([r,g,b]) {
  return "#" + [r,g,b].map(v => Math.round(v).toString(16).padStart(2,"0")).join("");
}
function rgbToHexStr(str) { return rgbArrayToHex(parseRgb(str)); }
function hexToRgb(hex) {
  hex = (hex||"#000000").replace("#","");
  if (hex.length === 3) hex = hex.split("").map(c => c+c).join("");
  return [0,2,4].map(i => parseInt(hex.slice(i,i+2), 16));
}
function escapeRtf(s) {
  let out = "";
  for (const ch of s) {
    const code = ch.codePointAt(0);
    if (ch === "\\") out += "\\\\";
    else if (ch === "{") out += "\\{";
    else if (ch === "}") out += "\\}";
    else if (ch === "\n") out += "\\line\n";
    else if (ch === "\t") out += "\\tab ";
    else if (code < 128) out += ch;
    else {
      let n = code;
      if (n > 32767) n = n - 65536;
      out += `\\u${n}?`;
    }
  }
  return out;
}

/* ---------- Network monitor (privacy proof) ----------
   We hook fetch / XHR / Image / navigator.sendBeacon before any user action
   and display all attempts. There should be ZERO entries for the running app.
---------------------------------------------------------- */
const NETWORK_LOG = [];
(function installNetMonitor() {
  const origFetch = window.fetch;
  window.fetch = function(...args) {
    const url = typeof args[0] === "string" ? args[0] : (args[0] && args[0].url) || "?";
    NETWORK_LOG.push({ type: "fetch", url, ts: Date.now() });
    return origFetch.apply(this, args);
  };
  const OrigXHR = window.XMLHttpRequest;
  window.XMLHttpRequest = function() {
    const x = new OrigXHR();
    const origOpen = x.open;
    x.open = function(method, url, ...rest) {
      NETWORK_LOG.push({ type: "xhr", method, url, ts: Date.now() });
      return origOpen.call(this, method, url, ...rest);
    };
    return x;
  };
  const OrigBeacon = navigator.sendBeacon;
  if (OrigBeacon) navigator.sendBeacon = function(url, data) {
    NETWORK_LOG.push({ type: "beacon", url, ts: Date.now() });
    return OrigBeacon.call(navigator, url, data);
  };
  // monitor Image() src (sometimes used for tracking)
  const OrigImage = window.Image;
  window.Image = function(...a) {
    const im = new OrigImage(...a);
    const desc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, "src");
    Object.defineProperty(im, "src", {
      set(v) { if (v) NETWORK_LOG.push({ type: "image", url: v, ts: Date.now() }); desc.set.call(this, v); },
      get() { return desc.get.call(this); }
    });
    return im;
  };
})();

/* ---------- Beautify / Format ---------- */
let _beautifyUndo = null;

/*
  Router: given a language key (from hljs), returns a function(code) => formatted code.
  All formatters run 100% locally. Unsupported languages return code unchanged
  (with a user notification).
*/
const FORMAT_SUPPORT = {
  // High-quality formatters
  javascript:   "jsb-js",
  js:           "jsb-js",
  typescript:   "jsb-js",   // js-beautify handles most TS OK
  ts:           "jsb-js",
  jsx:          "jsb-js",
  tsx:          "jsb-js",
  json:         "json",
  json5:        "json",
  html:         "jsb-html",
  xhtml:        "jsb-html",
  xml:          "xml",
  svg:          "xml",
  css:          "jsb-css",
  scss:         "jsb-css",
  less:         "jsb-css",
  sass:         "jsb-css",
  sql:          "sql",
  // C-family: js-beautify's JS mode handles braces, strings & comments well
  java:         "jsb-js",
  c:            "jsb-js",
  cpp:          "jsb-js",
  csharp:       "jsb-js",
  kotlin:       "jsb-js",
  swift:        "jsb-js",
  rust:         "jsb-js",
  go:           "jsb-js",
  dart:         "jsb-js",
  php:          "jsb-js",
  objectivec:   "jsb-js",
  scala:        "jsb-js",
  groovy:       "jsb-js",
  // Whitespace-sensitive: never reformat, but clean trailing whitespace
  python:       "safe-ws",
  yaml:         "safe-ws",
  ruby:         "safe-ws",
  bash:         "safe-ws",
  shell:        "safe-ws",
  makefile:     "safe-ws",
  // No-op (already clean-ish / can't be formatted safely)
  markdown:     "noop",
  plaintext:    "noop",
  diff:         "noop",
  ini:          "noop",
};

/* ---------- Individual formatters ---------- */

function getIndent() {
  const v = (el("indentStyle") && el("indentStyle").value) || "4";
  if (v === "tab") return { size: 1, char: "\t", string: "\t", isTab: true };
  const n = parseInt(v, 10) || 4;
  return { size: n, char: " ", string: " ".repeat(n), isTab: false };
}

function fmt_json(src) {
  const ind = getIndent();
  // JSON.stringify accepts a string for the indent argument — works for spaces or tab
  try {
    return JSON.stringify(JSON.parse(src), null, ind.string);
  } catch (e) {
    const cleaned = src
      .replace(/,(\s*[}\]])/g, "$1")
      .replace(/([{,\s])'([^'\\]*(?:\\.[^'\\]*)*)'(\s*:)/g, '$1"$2"$3')
      .replace(/:\s*'([^'\\]*(?:\\.[^'\\]*)*)'/g, ': "$1"');
    try {
      return JSON.stringify(JSON.parse(cleaned), null, ind.string);
    } catch (e2) {
      throw new Error("Invalid JSON: " + e.message);
    }
  }
}

function fmt_xml(src) {
  const IND = getIndent().string;
  let out = "";
  let depth = 0;

  const tokens = [];
  let i = 0;
  while (i < src.length) {
    if (src[i] === "<") {
      let end = src.indexOf(">", i);
      if (end === -1) { tokens.push(src.slice(i)); break; }
      if (src.startsWith("<![CDATA[", i)) {
        end = src.indexOf("]]>", i);
        if (end === -1) { tokens.push(src.slice(i)); break; }
        tokens.push({ type: "cdata", text: src.slice(i, end + 3) });
        i = end + 3; continue;
      }
      if (src.startsWith("<!--", i)) {
        end = src.indexOf("-->", i);
        if (end === -1) { tokens.push(src.slice(i)); break; }
        tokens.push({ type: "comment", text: src.slice(i, end + 3) });
        i = end + 3; continue;
      }
      if (src[i+1] === "?") {
        end = src.indexOf("?>", i);
        if (end === -1) { tokens.push(src.slice(i)); break; }
        tokens.push({ type: "pi", text: src.slice(i, end + 2) });
        i = end + 2; continue;
      }
      if (src[i+1] === "!") {
        tokens.push({ type: "directive", text: src.slice(i, end + 1) });
        i = end + 1; continue;
      }
      const raw = src.slice(i, end + 1);
      let type = "open";
      if (raw.startsWith("</")) type = "close";
      else if (raw.endsWith("/>")) type = "self";
      tokens.push({ type, text: raw });
      i = end + 1;
    } else {
      let end = src.indexOf("<", i);
      if (end === -1) end = src.length;
      const text = src.slice(i, end);
      if (text.trim()) tokens.push({ type: "text", text: text.trim() });
      i = end;
    }
  }

  for (let j = 0; j < tokens.length; j++) {
    const t = tokens[j];
    if (!t || typeof t === "string") continue;
    if (t.type === "close") depth = Math.max(0, depth - 1);

    if (t.type === "open" && tokens[j+1] && tokens[j+1].type === "text" && tokens[j+2] && tokens[j+2].type === "close") {
      out += IND.repeat(depth) + t.text + tokens[j+1].text + tokens[j+2].text + "\n";
      j += 2;
      continue;
    }
    out += IND.repeat(depth) + t.text + "\n";
    if (t.type === "open") depth++;
  }
  return out.replace(/\n+$/, "\n");
}

function fmt_sql(src) {
  if (!window.sqlFormatter || !window.sqlFormatter.format) {
    throw new Error("SQL-Formatter nicht geladen");
  }
  let language = "sql";
  if (/\bRETURNING\b|\bILIKE\b|\bserial\b/i.test(src)) language = "postgresql";
  else if (/\bAUTO_INCREMENT\b|\bENGINE\s*=\s*/i.test(src)) language = "mysql";
  else if (/\bIDENTITY\b|\bNVARCHAR\b|\b\[dbo\]/i.test(src)) language = "tsql";
  const ind = getIndent();
  return window.sqlFormatter.format(src, {
    language,
    keywordCase: "upper",
    tabWidth: ind.size,
    useTabs: ind.isTab,
  });
}

function fmt_jsb_js(src) {
  const ind = getIndent();
  return window.beautifier.js(src, {
    indent_size: ind.size,
    indent_char: ind.char,
    indent_with_tabs: ind.isTab,
    max_preserve_newlines: 2,
    preserve_newlines: true,
    keep_array_indentation: false,
    break_chained_methods: false,
    brace_style: "collapse",
    space_before_conditional: true,
    unescape_strings: false,
    jslint_happy: false,
    end_with_newline: false,
    wrap_line_length: 0,
    indent_inner_html: false,
    comma_first: false,
    e4x: false,
  });
}

function fmt_jsb_html(src) {
  const ind = getIndent();
  return window.beautifier.html(src, {
    indent_size: ind.size,
    indent_char: ind.char,
    indent_with_tabs: ind.isTab,
    max_preserve_newlines: 2,
    preserve_newlines: true,
    indent_inner_html: true,
    wrap_line_length: 0,
    wrap_attributes: "auto",
    end_with_newline: false,
  });
}

function fmt_jsb_css(src) {
  const ind = getIndent();
  return window.beautifier.css(src, {
    indent_size: ind.size,
    indent_char: ind.char,
    indent_with_tabs: ind.isTab,
    preserve_newlines: true,
    newline_between_rules: true,
    end_with_newline: false,
  });
}

function fmt_safe_ws(src) {
  // Whitespace-only cleanup for Python, YAML, Ruby, Bash, Makefile:
  // - strip trailing whitespace per line
  // - collapse >2 blank lines into 2
  // - normalise line endings
  // - NEVER change indentation (semantics!)
  return src
    .replace(/\r\n?/g, "\n")
    .split("\n")
    .map(l => l.replace(/[ \t]+$/, ""))
    .join("\n")
    .replace(/\n{3,}/g, "\n\n")
    .replace(/\n+$/, "");
}

function fmt_noop(src) { return src; }

const FORMATTERS = {
  "json":       fmt_json,
  "xml":        fmt_xml,
  "sql":        fmt_sql,
  "jsb-js":     fmt_jsb_js,
  "jsb-html":   fmt_jsb_html,
  "jsb-css":    fmt_jsb_css,
  "safe-ws":    fmt_safe_ws,
  "noop":       fmt_noop,
};

function currentFormatterFor(lang) {
  if (!lang || lang === "auto") {
    // Try to auto-detect; use the current highlight label
    const detected = (el("langVal").textContent || "").toLowerCase();
    return FORMAT_SUPPORT[detected] || null;
  }
  return FORMAT_SUPPORT[lang.toLowerCase()] || null;
}

function doBeautify() {
  const lang = el("language").value;
  const kind = currentFormatterFor(lang);
  if (!kind) {
    const label = (lang === "auto" ? el("langVal").textContent : lang) || "unbekannt";
    flash(`No formatter for "${label}"`);
    return;
  }
  const fn = FORMATTERS[kind];
  const before = codeInput.value;
  let after;
  try {
    after = fn(before);
  } catch (e) {
    flash("Beautify-Fehler: " + (e.message || e));
    return;
  }
  if (after === before) {
    flash("Bereits sauber formatiert");
    return;
  }
  _beautifyUndo = before;
  codeInput.value = after;
  render();
  const labels = {
    "json": "JSON", "xml": "XML", "sql": "SQL",
    "jsb-js": "js-beautify", "jsb-html": "js-beautify (html)",
    "jsb-css": "js-beautify (css)", "safe-ws": "Whitespace-Clean",
    "noop": "unchanged"
  };
  flash("✨ " + (labels[kind] || kind));
}

el("btnBeautify").addEventListener("click", doBeautify);
el("btnBeautifyUndo").addEventListener("click", () => {
  if (_beautifyUndo == null) { flash("Nichts zum Widerrufen"); return; }
  const cur = codeInput.value;
  codeInput.value = _beautifyUndo;
  _beautifyUndo = cur; // allow re-do
  render();
  flash("↶ Widerrufen");
});

/* ---------- Persistence (localStorage – purely local, no network) ----------
   Saves UI/styling preferences across reloads. The pasted code is NEVER persisted
   (privacy-by-default).
------------------------------------------------------------------------- */
const SETTINGS_KEY = "carbonite.settings.v1";

const SAVED_FIELDS = [
  ["theme",        "value"],
  ["language",     "value"],
  ["windowStyle",  "value"],
  ["titleInput",   "value"],
  ["showLines",    "checked"],
  ["showWatermark","checked"],
  ["transparent",  "checked"],
  ["customBg",     "value"],
  ["cardBg",       "value"],
  ["autoCardBg",   "checked"],
  ["padX",         "value"],
  ["padY",         "value"],
  ["radius",       "value"],
  ["shadow",       "value"],
  ["fontFamily",   "value"],
  ["fontSize",     "value"],
  ["lineHeight",   "value"],
  ["scale",        "value"],
  ["indentStyle",  "value"],
];

function gatherSettings() {
  const s = {};
  for (const [id, prop] of SAVED_FIELDS) {
    const e = el(id);
    if (e) s[id] = e[prop];
  }
  const active = document.querySelector(".bg-swatches .sw.active");
  s._activeGradient = active ? active.dataset.bg : null;
  return s;
}

function saveSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(gatherSettings()));
  } catch (e) {
    // localStorage may be disabled (private mode in some browsers, or for file://)
    console.warn("Settings could not be saved:", e.message);
  }
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

function applySettings(s) {
  if (!s) return;
  for (const [id, prop] of SAVED_FIELDS) {
    if (s[id] !== undefined && el(id)) {
      el(id)[prop] = s[id];
    }
  }
  // Sync display values
  applyTheme(el("theme").value);
  el("padXVal").textContent  = el("padX").value + "px";
  el("padYVal").textContent  = el("padY").value + "px";
  el("radVal").textContent   = el("radius").value + "px";
  el("shadowVal").textContent= el("shadow").value;
  el("sizeVal").textContent  = el("fontSize").value;
  el("lhVal").textContent    = (el("lineHeight").value/100).toFixed(2);
  el("scaleVal").textContent = el("scale").value + "×";
  const iv = el("indentStyle").value;
  el("indentVal").textContent = (iv === "tab") ? "Tab" : (iv + " spaces");

  // Apply CSS vars
  stage.style.setProperty("--pad-x", el("padX").value + "px");
  stage.style.setProperty("--pad-y", el("padY").value + "px");
  card.style.setProperty("--radius", el("radius").value + "px");
  applyShadow();
  applyType();
  card.style.setProperty("--code-font", el("fontFamily").value);

  // Window header (re-trigger handler logic)
  el("windowStyle").dispatchEvent(new Event("change"));
  el("windowTitle").value = el("titleInput").value;
  el("watermark").classList.toggle("hidden", !el("showWatermark").checked);

  // Background — restore gradient/color/transparent
  document.querySelectorAll(".bg-swatches .sw").forEach(sw => sw.classList.remove("active"));
  if (s.transparent) {
    stage.style.background = "transparent";
  } else if (s._activeGradient) {
    stage.style.background = s._activeGradient;
    document.querySelectorAll(".bg-swatches .sw").forEach(sw => {
      if (sw.dataset.bg === s._activeGradient) sw.classList.add("active");
    });
  } else if (s.customBg) {
    stage.style.background = s.customBg;
  }

  // Card background
  if (!s.autoCardBg && s.cardBg) {
    card.style.background = s.cardBg;
  }
}

function wireAutoSave() {
  // Debounce: only save after 200ms of inactivity
  let t = null;
  const debouncedSave = () => {
    clearTimeout(t);
    t = setTimeout(saveSettings, 200);
  };
  for (const [id] of SAVED_FIELDS) {
    const e = el(id);
    if (!e) continue;
    e.addEventListener("change", debouncedSave);
    e.addEventListener("input", debouncedSave);
  }
  document.querySelectorAll(".bg-swatches .sw").forEach(sw => {
    sw.addEventListener("click", debouncedSave);
  });
}

/* ---------- Init ---------- */
codeInput.value = DEFAULT_CODE;
applyTheme("atom-one-dark");
applyType();
applyShadow();
card.style.setProperty("--code-font", el("fontFamily").value);
card.style.setProperty("--radius", el("radius").value + "px");
stage.style.setProperty("--pad-x", el("padX").value + "px");
stage.style.setProperty("--pad-y", el("padY").value + "px");
stage.style.background = GRADIENTS[0];

// Load saved settings (if any) and apply BEFORE first render
const _saved = loadSettings();
if (_saved) applySettings(_saved);
wireAutoSave();

render();
</script>
